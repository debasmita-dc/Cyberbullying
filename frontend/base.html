<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title if title else "CyberSafe" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body>

<!-- Animated background blobs -->
<div class="bg-decoration">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<nav class="navbar">
  <a href="{{ url_for('home_page') }}" class="nav-brand">
    <i class="fas fa-shield-halved"></i>
    <span>CyberSafe</span>
  </a>
  <div class="nav-links">
    <a class="{{ 'active' if active=='home' else '' }}" href="{{ url_for('home_page') }}">
      <i class="fas fa-house"></i> Home
    </a>
    <a class="{{ 'active' if active=='detect' else '' }}" href="{{ url_for('detect_page') }}">
      <i class="fas fa-magnifying-glass"></i> Detect
    </a>
    <a class="{{ 'active' if active=='report' else '' }}" href="{{ url_for('report_page') }}">
      <i class="fas fa-flag"></i> Report
    </a>
    <a class="{{ 'active' if active=='legal' else '' }}" href="{{ url_for('legal_page') }}">
      <i class="fas fa-scale-balanced"></i> Legal
    </a>
    <a class="{{ 'active' if active=='dashboard' else '' }}" href="{{ url_for('dashboard_page') }}">
      <i class="fas fa-chart-line"></i> Dashboard
    </a>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
    <i class="fas fa-bars"></i>
  </button>
</nav>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <p><i class="fas fa-shield-halved"></i> CyberSafe &mdash; Detect, Report & Protect Against Online Harassment</p>
    <p class="footer-sub">Built for awareness. Not legal advice.</p>
  </div>
</footer>

{% block body_extra %}{% endblock %}

<script>
  // Mobile nav toggle
  const toggle = document.getElementById('navToggle');
  const navLinks = document.querySelector('.nav-links');
  if (toggle) {
    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      toggle.querySelector('i').classList.toggle('fa-bars');
      toggle.querySelector('i').classList.toggle('fa-xmark');
    });
  }

  // Intersection Observer for fade-in animations
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
</body>
</html>
